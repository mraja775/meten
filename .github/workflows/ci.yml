name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      BETTER_AUTH_SECRET: ci-only-secret-not-used-at-runtime
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consumer-android
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: android-actions/setup-android@v4
      - run: chmod +x gradlew
      - run: ./gradlew --no-daemon lintDebug testDebugUnitTest assembleDebug
      - run: METEN_API_BASE_URL=https://api.meten.invalid ./gradlew --no-daemon lintRelease testReleaseUnitTest assembleRelease
      - uses: actions/upload-artifact@v7
        with:
          name: meten-consumer-debug
          path: consumer-android/app/build/outputs/apk/debug/app-debug.apk
